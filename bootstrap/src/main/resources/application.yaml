spring:
  application:
    name: chess-backend
  main:
    web-application-type: servlet
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chess_backend}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
  sql:
    init:
      mode: always
      schema-locations: classpath:/schema-${DB_PLATFORM:postgresql}.sql

server:
  port: ${SERVER_PORT:8081}

app:
  db:
    vendor: ${DB_VENDOR:postgresql}
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"

stockfish:
  host: ${STOCKFISH_HOST:localhost}
  port: ${STOCKFISH_PORT:8088}
  depth: ${STOCKFISH_DEPTH:12}
  connect-timeout-ms: ${STOCKFISH_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${STOCKFISH_READ_TIMEOUT_MS:8000}
  pool:
    size: ${STOCKFISH_POOL_SIZE:2}
    borrow-timeout-ms: ${STOCKFISH_BORROW_TIMEOUT_MS:3000}

review:
  engine:
    depth:
      quick: ${REVIEW_ENGINE_DEPTH_QUICK:8}
      standard: ${REVIEW_ENGINE_DEPTH_STANDARD:12}
      deep: ${REVIEW_ENGINE_DEPTH_DEEP:16}
  job:
    maxConcurrent: ${REVIEW_JOB_MAX_CONCURRENT:2}
    maxQueueSize: ${REVIEW_JOB_MAX_QUEUE_SIZE:100}
  cache:
    enabled: ${REVIEW_CACHE_ENABLED:true}
    ttlSeconds: ${REVIEW_CACHE_TTL_SECONDS:604800}
